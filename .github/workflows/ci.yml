name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz -o kubeconform.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Check kubeconform version
        run: kubeconform -v

      - name: Validate plain Kubernetes manifests
        run: kubeconform -strict -summary manifests

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.15.4

      - name: Check Helm version
        run: helm version

      - name: Lint application Helm chart
        run: helm lint ./helm/application

      - name: Render application Helm chart
        run: helm template microservices-platform ./helm/application --namespace microservices-platform > rendered-application.yaml

      - name: Validate rendered application manifests
        run: kubeconform -strict -summary rendered-application.yaml

      - name: Lint AWS platform Helm chart
        run: helm lint ./helm/platform/aws

      - name: Render AWS platform Helm chart
        run: helm template aws-platform ./helm/platform/aws --namespace kube-system > rendered-aws-platform.yaml

      - name: Validate rendered AWS platform manifests
        run: kubeconform -strict -summary rendered-aws-platform.yaml

      - name: Validate Argo CD applications
        run: |
          kubeconform \
            -strict \
            -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            argocd/applications

  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"

      - name: Check Terraform version
        run: terraform version

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform/aws

      - name: Initialize Terraform
        run: terraform -chdir=terraform/aws init -backend=false

      - name: Validate Terraform
        run: terraform -chdir=terraform/aws validate

  go-tests:
    name: Go tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - src/checkoutservice
          - src/frontend
          - src/productcatalogservice
          - src/shippingservice

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.3"
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Check Go version
        working-directory: ${{ matrix.service }}
        run: go version

      - name: Run Go tests
        working-directory: ${{ matrix.service }}
        run: go test ./...

  dotnet-tests:
    name: .NET tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Check .NET version
        run: dotnet --version

      - name: Run cartservice tests
        working-directory: src/cartservice
        run: dotnet test cartservice.sln

  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    outputs:
      container-images: ${{ steps.image-matrix.outputs.container-images }}
      image-matrix: ${{ steps.image-matrix.outputs.image-matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect container image changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            workflow:
              - ".github/workflows/ci.yml"
            adservice:
              - src/adservice/**
            cartservice:
              - src/cartservice/**
            checkoutservice:
              - src/checkoutservice/**
            currencyservice:
              - src/currencyservice/**
            emailservice:
              - src/emailservice/**
            frontend:
              - src/frontend/**
            loadgenerator:
              - src/loadgenerator/**
            paymentservice:
              - src/paymentservice/**
            productcatalogservice:
              - src/productcatalogservice/**
            recommendationservice:
              - src/recommendationservice/**
            shippingservice:
              - src/shippingservice/**

      - name: Build container image matrix
        id: image-matrix
        env:
          WORKFLOW_CHANGED: ${{ steps.filter.outputs.workflow }}
          ADSERVICE_CHANGED: ${{ steps.filter.outputs.adservice }}
          CARTSERVICE_CHANGED: ${{ steps.filter.outputs.cartservice }}
          CHECKOUTSERVICE_CHANGED: ${{ steps.filter.outputs.checkoutservice }}
          CURRENCYSERVICE_CHANGED: ${{ steps.filter.outputs.currencyservice }}
          EMAILSERVICE_CHANGED: ${{ steps.filter.outputs.emailservice }}
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          LOADGENERATOR_CHANGED: ${{ steps.filter.outputs.loadgenerator }}
          PAYMENTSERVICE_CHANGED: ${{ steps.filter.outputs.paymentservice }}
          PRODUCTCATALOGSERVICE_CHANGED: ${{ steps.filter.outputs.productcatalogservice }}
          RECOMMENDATIONSERVICE_CHANGED: ${{ steps.filter.outputs.recommendationservice }}
          SHIPPINGSERVICE_CHANGED: ${{ steps.filter.outputs.shippingservice }}
        run: |
          services=()

          add_service() {
            services+=("{\"image\":\"$1\",\"context\":\"$2\",\"dockerfile\":\"$3\",\"valuesKey\":\"$4\"}")
          }

          if [ "${WORKFLOW_CHANGED}" = "true" ] || [ "${ADSERVICE_CHANGED}" = "true" ]; then
            add_service "adservice" "src/adservice" "src/adservice/Dockerfile" "adService"
          fi

          if [ "${WORKFLOW_CHANGED}" = "true" ] || [ "${CARTSERVICE_CHANGED}" = "true" ]; then
            add_service "cartservice" "src/cartservice/src" "src/cartservice/src/Dockerfile" "cartService"
          fi

          if [ "${WORKFLOW_CHANGED}" = "true" ] || [ "${CHECKOUTSERVICE_CHANGED}" = "true" ]; then
            add_service "checkoutservice" "src/checkoutservice" "src/checkoutservice/Dockerfile" "checkoutService"
          fi

          if [ "${WORKFLOW_CHANGED}" = "true" ] || [ "${CURRENCYSERVICE_CHANGED}" = "true" ]; then
            add_service "currencyservice" "src/currencyservice" "src/currencyservice/Dockerfile" "currencyService"
          fi

          if [ "${WORKFLOW_CHANGED}" = "true" ] || [ "${EMAILSERVICE_CHANGED}" = "true" ]; then
            add_service "emailservice" "src/emailservice" "src/emailservice/Dockerfile" "emailService"
          fi

          if [ "${WORKFLOW_CHANGED}" = "true" ] || [ "${FRONTEND_CHANGED}" = "true" ]; then
            add_service "frontend" "src/frontend" "src/frontend/Dockerfile" "frontend"
          fi

          if [ "${WORKFLOW_CHANGED}" = "true" ] || [ "${LOADGENERATOR_CHANGED}" = "true" ]; then
            add_service "loadgenerator" "src/loadgenerator" "src/loadgenerator/Dockerfile" "loadGenerator"
          fi

          if [ "${WORKFLOW_CHANGED}" = "true" ] || [ "${PAYMENTSERVICE_CHANGED}" = "true" ]; then
            add_service "paymentservice" "src/paymentservice" "src/paymentservice/Dockerfile" "paymentService"
          fi

          if [ "${WORKFLOW_CHANGED}" = "true" ] || [ "${PRODUCTCATALOGSERVICE_CHANGED}" = "true" ]; then
            add_service "productcatalogservice" "src/productcatalogservice" "src/productcatalogservice/Dockerfile" "productCatalogService"
          fi

          if [ "${WORKFLOW_CHANGED}" = "true" ] || [ "${RECOMMENDATIONSERVICE_CHANGED}" = "true" ]; then
            add_service "recommendationservice" "src/recommendationservice" "src/recommendationservice/Dockerfile" "recommendationService"
          fi

          if [ "${WORKFLOW_CHANGED}" = "true" ] || [ "${SHIPPINGSERVICE_CHANGED}" = "true" ]; then
            add_service "shippingservice" "src/shippingservice" "src/shippingservice/Dockerfile" "shippingService"
          fi

          if [ "${#services[@]}" -eq 0 ]; then
            echo "container-images=false" >> "$GITHUB_OUTPUT"
            echo 'image-matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            matrix=$(printf '%s\n' "${services[@]}" | jq -cs '{include: .}')
            echo "container-images=true" >> "$GITHUB_OUTPUT"
            echo "image-matrix=${matrix}" >> "$GITHUB_OUTPUT"
          fi

  build-container-images:
    name: Build container images
    runs-on: ubuntu-latest
    needs:
      - validate
      - go-tests
      - dotnet-tests
      - detect-changes
    if: needs.detect-changes.outputs.container-images == 'true'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.image-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare image tags
        id: image-tags
        env:
          IMAGE_NAME: ${{ matrix.image }}
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}"

          {
            echo "tags<<EOF"
            echo "${image}:${GITHUB_SHA}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${image}:main"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          platforms: linux/amd64
          tags: ${{ steps.image-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  update-helm-image-tags:
    name: Update Helm image tags
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-container-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.container-images == 'true'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Install yq
        run: |
          curl -sSL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o yq
          chmod +x yq
          sudo mv yq /usr/local/bin/yq

      - name: Update Helm image tags
        env:
          IMAGE_MATRIX: ${{ needs.detect-changes.outputs.image-matrix }}
        run: |
          echo "${IMAGE_MATRIX}" | jq -r '.include[].valuesKey' | while read -r values_key; do
            yq -i ".${values_key}.image.tag = strenv(GITHUB_SHA)" helm/application/values-eks.yaml
            yq -i ".${values_key}.image.tag = strenv(GITHUB_SHA)" helm/application/values-local.yaml
          done

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.15.4

      - name: Validate updated Helm values
        run: |
          helm lint ./helm/application
          helm template microservices-platform ./helm/application \
            --namespace microservices-platform \
            -f helm/application/values.yaml \
            -f helm/application/values-eks.yaml \
            > rendered-application-eks.yaml
          helm template microservices-platform ./helm/application \
            --namespace microservices-platform \
            -f helm/application/values.yaml \
            -f helm/application/values-local.yaml \
            > rendered-application-local.yaml

      - name: Create image tag update PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            helm/application/values-eks.yaml
            helm/application/values-local.yaml
          branch: automation/update-helm-image-tags/${{ github.sha }}
          delete-branch: true
          commit-message: Update Helm image tags for ${{ github.sha }}
          title: Update Helm image tags for ${{ github.sha }}
          body: |
            Updates Helm values to use the immutable image tag
            `${{ github.sha }}` for the service images built from this `main`
            revision.

            Updated files:
            - `helm/application/values-eks.yaml`
            - `helm/application/values-local.yaml`

            Source workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
