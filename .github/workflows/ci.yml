name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz -o kubeconform.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Check kubeconform version
        run: kubeconform -v

      - name: Validate plain Kubernetes manifests
        run: kubeconform -strict -summary manifests

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.15.4

      - name: Check Helm version
        run: helm version

      - name: Lint Helm chart
        run: helm lint ./helm

      - name: Render Helm chart
        run: helm template microservices-platform ./helm --namespace microservices-platform > rendered.yaml

      - name: Validate rendered Helm manifests
        run: kubeconform -strict -summary rendered.yaml

      - name: Validate Argo CD applications
        run: |
          kubeconform \
            -strict \
            -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            argocd/applications

  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"

      - name: Check Terraform version
        run: terraform version

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform/aws

      - name: Initialize Terraform
        run: terraform -chdir=terraform/aws init -backend=false

      - name: Validate Terraform
        run: terraform -chdir=terraform/aws validate

  go-tests:
    name: Go tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - src/checkoutservice
          - src/frontend
          - src/productcatalogservice
          - src/shippingservice

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.3"
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Check Go version
        working-directory: ${{ matrix.service }}
        run: go version

      - name: Run Go tests
        working-directory: ${{ matrix.service }}
        run: go test ./...

  dotnet-tests:
    name: .NET tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Check .NET version
        run: dotnet --version

      - name: Run cartservice tests
        working-directory: src/cartservice
        run: dotnet test cartservice.sln

  build-container-images:
    name: Build container images
    runs-on: ubuntu-latest
    needs:
      - validate
      - go-tests
      - dotnet-tests

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: adservice
            context: src/adservice
            dockerfile: src/adservice/Dockerfile
          - image: cartservice
            context: src/cartservice/src
            dockerfile: src/cartservice/src/Dockerfile
          - image: checkoutservice
            context: src/checkoutservice
            dockerfile: src/checkoutservice/Dockerfile
          - image: currencyservice
            context: src/currencyservice
            dockerfile: src/currencyservice/Dockerfile
          - image: emailservice
            context: src/emailservice
            dockerfile: src/emailservice/Dockerfile
          - image: frontend
            context: src/frontend
            dockerfile: src/frontend/Dockerfile
          - image: loadgenerator
            context: src/loadgenerator
            dockerfile: src/loadgenerator/Dockerfile
          - image: paymentservice
            context: src/paymentservice
            dockerfile: src/paymentservice/Dockerfile
          - image: productcatalogservice
            context: src/productcatalogservice
            dockerfile: src/productcatalogservice/Dockerfile
          - image: recommendationservice
            context: src/recommendationservice
            dockerfile: src/recommendationservice/Dockerfile
          - image: shippingservice
            context: src/shippingservice
            dockerfile: src/shippingservice/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare image tags
        id: image-tags
        env:
          IMAGE_NAME: ${{ matrix.image }}
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}"

          {
            echo "tags<<EOF"
            echo "${image}:${GITHUB_SHA}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${image}:main"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          platforms: linux/amd64
          tags: ${{ steps.image-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
