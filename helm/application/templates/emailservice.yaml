apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ms-k8s-platform.emailServiceLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.emailService.replicas }}
  selector:
    matchLabels:
      {{- include "ms-k8s-platform.emailServiceSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ms-k8s-platform.emailServiceSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: emailservice
          image: "{{ .Values.emailService.image.repository }}:{{ .Values.emailService.image.tag }}"
          imagePullPolicy: {{ .Values.emailService.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DISABLE_PROFILER
              value: "1"
          readinessProbe:
            periodSeconds: 5
            grpc:
              port: 8080
          livenessProbe:
            periodSeconds: 5
            grpc:
              port: 8080
          resources:
            requests:
              cpu: {{ .Values.emailService.resources.requests.cpu }}
              memory: {{ .Values.emailService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.emailService.resources.limits.cpu }}
              memory: {{ .Values.emailService.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: emailservice
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ms-k8s-platform.emailServiceLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ms-k8s-platform.emailServiceSelectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: 5000
      targetPort: 8080
