apiVersion: apps/v1
kind: Deployment
metadata:
  name: currencyservice
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ms-k8s-platform.currencyServiceLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.currencyService.replicas }}
  selector:
    matchLabels:
      {{- include "ms-k8s-platform.currencyServiceSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ms-k8s-platform.currencyServiceSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: currencyservice
          image: "{{ .Values.currencyService.image.repository }}:{{ .Values.currencyService.image.tag }}"
          imagePullPolicy: {{ .Values.currencyService.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 7000
          env:
            - name: PORT
              value: "7000"
            - name: DISABLE_PROFILER
              value: "1"
          readinessProbe:
            grpc:
              port: 7000
          livenessProbe:
            grpc:
              port: 7000
          resources:
            requests:
              cpu: {{ .Values.currencyService.resources.requests.cpu }}
              memory: {{ .Values.currencyService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.currencyService.resources.limits.cpu }}
              memory: {{ .Values.currencyService.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: currencyservice
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ms-k8s-platform.currencyServiceLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ms-k8s-platform.currencyServiceSelectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: 7000
      targetPort: 7000
