{{- if .Values.storageClasses.gp3.enabled }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.storageClasses.gp3.name | quote }}
  {{- if .Values.storageClasses.gp3.default }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
  {{- end }}
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: {{ .Values.storageClasses.gp3.encrypted | quote }}
reclaimPolicy: {{ .Values.storageClasses.gp3.reclaimPolicy }}
allowVolumeExpansion: {{ .Values.storageClasses.gp3.allowVolumeExpansion }}
volumeBindingMode: {{ .Values.storageClasses.gp3.volumeBindingMode }}
{{- end }}
