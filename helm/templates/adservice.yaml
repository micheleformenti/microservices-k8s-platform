apiVersion: apps/v1
kind: Deployment
metadata:
  name: adservice
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ms-k8s-platform.adServiceLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.adService.replicas }}
  selector:
    matchLabels:
      {{- include "ms-k8s-platform.adServiceSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ms-k8s-platform.adServiceSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: adservice
          image: "{{ .Values.adService.image.repository }}:{{ .Values.adService.image.tag }}"
          imagePullPolicy: {{ .Values.adService.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 9555
          env:
            - name: PORT
              value: "9555"
            - name: DISABLE_TRACING
              value: "1"
            - name: DISABLE_STATS
              value: "1"
          resources:
            requests:
              cpu: {{ .Values.adService.resources.requests.cpu }}
              memory: {{ .Values.adService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.adService.resources.limits.cpu }}
              memory: {{ .Values.adService.resources.limits.memory }}
          readinessProbe:
            initialDelaySeconds: 20
            periodSeconds: 15
            grpc:
              port: 9555
          livenessProbe:
            initialDelaySeconds: 20
            periodSeconds: 15
            grpc:
              port: 9555
---
apiVersion: v1
kind: Service
metadata:
  name: adservice
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ms-k8s-platform.adServiceLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ms-k8s-platform.adServiceSelectorLabels" . | nindent 4 }}
  ports:
    - name: grpc
      port: 9555
      targetPort: 9555
