apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eks-platform
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/micheleformenti/microservices-k8s-platform.git
    targetRevision: main
    path: helm/platform/aws
    helm:
      releaseName: aws-platform

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
